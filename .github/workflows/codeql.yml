name: "CodeQL"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "37 6 * * 1"
  workflow_dispatch:
    inputs:
      query_pack:
        description: "Query pack to run (security-and-quality, security-extended, security-only)"
        required: false
        default: "security-and-quality"
        type: choice
        options:
          - security-and-quality
          - security-extended
          - security-only

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      # `actions: read` is needed for CodeQL to download the actions
      # source tree for analysis. Added explicitly per CodeQL v3 docs.

    strategy:
      fail-fast: false
      matrix:
        include:
          # Frontend (Next.js) — analyzes apps/web/** on source, no build.
          - language: javascript-typescript
            build-mode: none
          # API (Fastify + Prisma) — analyzes apps/api/** on source.
          #   Python files live under apps/api/src/**/*.py. CodeQL
          #   auto-detects them when the language is `python`.
          - language: python
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # We don't run builds — JS/TS analysis is at-source for our project.
          queries: security-and-quality

      # NOTE: `analyze@v3` already uploads the SARIF to GitHub's code
      # scanning tab AND cleans up the temp file afterwards. A separate
      # `upload-sarif` step is redundant and was failing with
      # "Path does not exist: .../codeql/results.sarif" because
      # `analyze@v3` had already deleted the file.
      #
      # If we ever need the SARIF file accessible later in the workflow
      # (e.g. for a downstream job), set `output` here:
      #   with:
      #     output: ${{ runner.workspace }}/codeql/${{ matrix.language }}.sarif
      # and use ${{ steps.analyze.outputs.sarif-output }} in later steps.
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"