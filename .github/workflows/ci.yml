name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Dummy URL is fine for `prisma generate` (it only needs a valid
      # connection-string format, never opens a real connection).
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.15.0 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @elixio/api exec prisma generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          # Web build needs the public env vars defined to inline.
          NEXT_PUBLIC_API_URL: https://api.elixio.digital
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          EXPO_PUBLIC_API_URL: https://api.elixio.digital
